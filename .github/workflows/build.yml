name: Build Chess4U

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (iPhone & iPad)
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -version

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Show available simulators
        run: |
          xcrun simctl list devices available | grep -E "iPhone 16 Pro|iPad Pro 13"

      - name: Build for iPhone simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Chess4U.xcodeproj \
            -scheme Chess4U \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
          | xcpretty

      - name: Build for iPad simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Chess4U.xcodeproj \
            -scheme Chess4U \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
          | xcpretty

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog
          retention-days: 7
