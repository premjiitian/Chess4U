name: Initialize Match Certificates

# Run this ONCE from GitHub → Actions → "Initialize Match Certificates" → Run workflow
# It creates the Apple Distribution certificate + App Store provisioning profile,
# encrypts them, and pushes them to your private certs repo.
# After that, every release uses them automatically — no Mac ever needed.

on:
  workflow_dispatch:
    inputs:
      force_recreate:
        description: "Recreate certificates even if they already exist?"
        type: boolean
        default: false

jobs:
  init:
    name: Generate & push certificates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure git identity
        run: |
          git config --global user.email "ci@chess4u.app"
          git config --global user.name "Chess4U CI"

      - name: Enable OpenSSL legacy provider
        # Apple API keys use explicit EC curve parameters. OpenSSL 3.x's default
        # provider rejects these; the legacy provider decodes them correctly.
        run: |
          cat > /tmp/openssl_legacy.cnf << 'EOF'
          openssl_conf = openssl_init
          [openssl_init]
          providers = provider_sect
          [provider_sect]
          default = default_sect
          legacy = legacy_sect
          [default_sect]
          activate = 1
          [legacy_sect]
          activate = 1
          EOF
          echo "OPENSSL_CONF=/tmp/openssl_legacy.cnf" >> $GITHUB_ENV

      - name: Run init_match lane
        env:
          MATCH_GIT_URL:                    ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:                   ${{ secrets.MATCH_PASSWORD }}
          GH_PAT:                           ${{ secrets.GH_PAT }}
          DEVELOPMENT_TEAM:                 ${{ secrets.DEVELOPMENT_TEAM }}
          APP_STORE_CONNECT_API_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:      ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          MATCH_FORCE_RECREATE:             ${{ inputs.force_recreate }}
        run: bundle exec fastlane init_match
