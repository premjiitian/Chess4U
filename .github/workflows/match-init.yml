name: Initialize Match Certificates

# Run this ONCE from GitHub → Actions → "Initialize Match Certificates" → Run workflow
# It creates the Apple Distribution certificate + App Store provisioning profile,
# encrypts them, and pushes them to your private certs repo.
# After that, every release uses them automatically — no Mac ever needed.

on:
  workflow_dispatch:
    inputs:
      force_recreate:
        description: "Recreate certificates even if they already exist?"
        type: boolean
        default: false

jobs:
  init:
    name: Generate & push certificates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure git identity
        run: |
          git config --global user.email "ci@chess4u.app"
          git config --global user.name "Chess4U CI"

      - name: Run init_match lane
        env:
          MATCH_GIT_URL:                    ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:                   ${{ secrets.MATCH_PASSWORD }}
          GH_PAT:                           ${{ secrets.GH_PAT }}
          DEVELOPMENT_TEAM:                 ${{ secrets.DEVELOPMENT_TEAM }}
          APP_STORE_CONNECT_API_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:      ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          MATCH_FORCE_RECREATE:             ${{ inputs.force_recreate }}
        run: |
          # Normalize the API key to base64(PKCS#8 PEM) regardless of whether the
          # secret holds raw PEM text or a base64-encoded PEM string.  Python's
          # cryptography library handles every valid EC key format and re-exports it
          # in the exact form ruby-openssl 3.x + OpenSSL 3.x accept.
          normalized=$(python3 - << 'PYEOF'
          import base64, os, sys
          from cryptography.hazmat.primitives import serialization
          raw = os.environ.get('APP_STORE_CONNECT_API_KEY_BASE64', '')
          if not raw:
              print('[key-norm] APP_STORE_CONNECT_API_KEY_BASE64 is not set', file=sys.stderr)
              sys.exit(1)
          candidates = []
          try:
              stripped = ''.join(raw.split())
              candidates.append(base64.b64decode(stripped, validate=True))
          except Exception:
              pass
          candidates.append(raw.encode())
          for i, data in enumerate(candidates):
              try:
                  key = serialization.load_pem_private_key(data, password=None)
                  pem = key.private_bytes(
                      serialization.Encoding.PEM,
                      serialization.PrivateFormat.PKCS8,
                      serialization.NoEncryption())
                  print(base64.b64encode(pem).decode(), end='')
                  sys.exit(0)
              except Exception as e:
                  print('[key-norm] attempt ' + str(i) + ' failed: ' + str(e), file=sys.stderr)
          print('[key-norm] could not load key in any format', file=sys.stderr)
          sys.exit(1)
          PYEOF
          )
          APP_STORE_CONNECT_API_KEY_BASE64="$normalized" bundle exec fastlane init_match
