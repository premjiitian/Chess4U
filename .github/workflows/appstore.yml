name: Submit to App Store

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'submit' to confirm App Store submission"
        required: true
      build_number:
        description: "TestFlight build number to submit (leave blank for latest processed build)"
        required: false
        default: ""

jobs:
  submit:
    name: Capture Screenshots & Submit to App Store Review
    # See release.yml for why this needs to be macos-26 / Xcode 26: Apple now
    # rejects App Store Connect submissions built with anything older than
    # the iOS 26 SDK.
    runs-on: macos-26
    if: ${{ github.event.inputs.confirm == 'submit' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Boot simulators for screenshots
        # Device names updated to match what's actually pre-installed on the
        # macos-26 runner image (device generations move forward every year).
        run: |
          xcrun simctl boot "iPhone 17 Pro Max"     || true
          xcrun simctl boot "iPhone Air"            || true
          xcrun simctl boot "iPad Pro 13-inch (M5)" || true

      - name: Capture screenshots
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"
        run: bundle exec fastlane screenshots

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-store-screenshots
          path: fastlane/screenshots/
          retention-days: 30

      - name: Submit to App Store
        env:
          APP_STORE_CONNECT_API_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:      ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          DEVELOPMENT_TEAM:                 ${{ secrets.DEVELOPMENT_TEAM }}
          BUILD_NUMBER:                     ${{ github.event.inputs.build_number }}
        run: bundle exec fastlane release
